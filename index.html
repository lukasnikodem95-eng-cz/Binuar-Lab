<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binaural Lab 🎧</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 850px; margin: auto; background: #151515; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; margin: 15px 0; border: 1px solid #333; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .input-group { background: #222; padding: 8px; border-radius: 10px; flex: 1; min-width: 80px; }
        input[type="number"] { background: #111; border: 1px solid #444; color: #00ff95; padding: 8px; width: 100%; box-sizing: border-box; text-align: center; }
        .presets { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-preset { background: #222; color: #bbb; border: 1px solid #333; padding: 10px; border-radius: 15px; cursor: pointer; flex: 1 1 30%; }
        .btn-row { width: 100%; display: flex; gap: 10px; margin-top: 10px; }
        button.main-btn { flex: 1; padding: 15px; cursor: pointer; border-radius: 12px; border: none; font-weight: bold; }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #c0392b; color: white; }
        .diff-display { font-size: 1.8em; color: #00ff95; font-weight: bold; margin: 10px 0; }
        #swapBtn { background: #ff4400; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Binaural Lab 🎧</h1>
    <div class="presets">
        <button class="btn-preset" onclick="setPreset(100, 101.5, 'relax')">🌙 Spánek</button>
        <button class="btn-preset" onclick="setPreset(200, 206, 'relax')">🧘 Meditace</button>
        <button class="btn-preset" onclick="setPreset(300, 310, 'relax')">🎨 Relax</button>
        <button class="btn-preset" onclick="setPreset(400, 420, 'energy')">🧠 Fokus</button>
        <button class="btn-preset" onclick="setPreset(200, 240, 'energy')">⚡ Výkon</button>
    </div>
    <div class="controls">
        <div class="input-group"><input type="number" id="leftFreq" value="200" oninput="updateDiff(); updateSwapStatus();"></div>
        <div class="input-group"><input type="number" id="rightFreq" value="240" oninput="updateDiff(); updateSwapStatus();"></div>
        <button id="swapBtn" onclick="swapChannels()">MODE: ENERGY (L>R)</button>
        <div class="btn-row">
            <button class="main-btn btn-start" onclick="start()">Start</button>
            <button class="main-btn btn-stop" onclick="stop()">Stop</button>
        </div>
    </div>
    <div class="diff-display" id="diffVal">40.0 Hz</div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" style="width:80%" oninput="updateVolume()">
    <canvas id="visual"></canvas>
</div>

<script>
let audioCtx, leftOsc, rightOsc, gainNode, animationId;

function updateDiff() {
    const f1 = parseFloat(document.getElementById("leftFreq").value) || 0;
    const f2 = parseFloat(document.getElementById("rightFreq").value) || 0;
    document.getElementById("diffVal").innerText = `${Math.abs(f1 - f2).toFixed(1)} Hz`;
}

function updateVolume() { if (gainNode) gainNode.gain.setTargetAtTime(document.getElementById("volume").value, audioCtx.currentTime, 0.05); }

function start() {
    if (audioCtx) stop();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain(); gainNode.gain.value = document.getElementById("volume").value;
    const f1 = parseFloat(document.getElementById("leftFreq").value);
    const f2 = parseFloat(document.getElementById("rightFreq").value);
    leftOsc = audioCtx.createOscillator(); rightOsc = audioCtx.createOscillator();
    const merger = audioCtx.createChannelMerger(2);
    leftOsc.frequency.value = f1; rightOsc.frequency.value = f2;
    leftOsc.connect(merger, 0, 0); rightOsc.connect(merger, 0, 1);
    merger.connect(gainNode).connect(audioCtx.destination);
    leftOsc.start(); rightOsc.start(); drawWave(f1, f2);
}

function stop() { if (leftOsc) { leftOsc.stop(); rightOsc.stop(); } if (audioCtx) audioCtx.close(); if (animationId) cancelAnimationFrame(animationId); }

function drawWave(f1, f2) {
    const canvas = document.getElementById("visual"); const ctx = canvas.getContext("2d");
    if (animationId) cancelAnimationFrame(animationId);
    let offset = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const render3D = (freqRatio, color, speed) => {
            for (let x = 0; x < canvas.width; x += 4) {
                let z = Math.sin((x * 0.02) + offset * speed);
                let p = (z + 2) / 2;
                let y = 80 + Math.sin((x * 0.03 * freqRatio) + offset) * (35 * p);
                ctx.beginPath(); ctx.strokeStyle = color; ctx.globalAlpha = 0.3 + (p - 0.5);
                ctx.lineWidth = 2 * p; ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2); ctx.stroke();
            }
        };
        render3D(1, "#3498db", 1.2); render3D(f2 / f1, "#e74c3c", 0.8);
        offset += 0.05; animationId = requestAnimationFrame(draw);
    }
    draw();
}

function setPreset(f1, f2, mode) {
    let high = Math.max(f1, f2); let low = Math.min(f1, f2);
    if (mode === 'energy') { document.getElementById("leftFreq").value = high; document.getElementById("rightFreq").value = low; }
    else { document.getElementById("leftFreq").value = low; document.getElementById("rightFreq").value = high; }
    updateDiff(); updateSwapStatus(); if(audioCtx) start();
}

function swapChannels() {
    let l = document.getElementById('leftFreq'); let r = document.getElementById('rightFreq');
    let temp = l.value; l.value = r.value; r.value = temp;
    updateDiff(); updateSwapStatus(); if(audioCtx) start();
}

function updateSwapStatus() {
    let l = parseFloat(document.getElementById('leftFreq').value) || 0;
    let r = parseFloat(document.getElementById('rightFreq').value) || 0;
    let btn = document.getElementById('swapBtn');
    if (l > r) { btn.innerText = "MODE: ENERGY (L>R)"; btn.style.backgroundColor = "#ff4400"; }
    else { btn.innerText = "MODE: RELAX (R>L)"; btn.style.backgroundColor = "#3498db"; }
}
updateSwapStatus();
</script>
</body>
</html>
