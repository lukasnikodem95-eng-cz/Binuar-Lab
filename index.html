<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Binaural Lab 🎧</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: env(safe-area-inset-top) 15px 20px 15px; margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 850px; margin: auto; background: #151515; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; position: relative; }
        
        .lang-bar { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; cursor: pointer; font-size: 1.3em; z-index: 100; }
        .lang-bar span { opacity: 0.3; transition: 0.3s; }
        .lang-bar span.active { opacity: 1; transform: scale(1.2); }

        canvas { width: 100%; height: 160px; background: #000; border-radius: 12px; margin: 15px 0; border: 1px solid #333; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .input-group { background: #222; padding: 8px; border-radius: 10px; flex: 1; min-width: 80px; }
        input[type="number"] { background: #111; border: 1px solid #444; color: #00ff95; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; text-align: center; font-size: 1.1em; }
        
        .presets { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-preset { background: #222; color: #bbb; border: 1px solid #333; padding: 10px 12px; border-radius: 15px; cursor: pointer; font-size: 0.8em; flex: 1 1 30%; }

        .btn-row { width: 100%; display: flex; gap: 10px; margin-top: 10px; }
        button.main-btn { flex: 1; padding: 15px; cursor: pointer; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; font-size: 1em; }
        .btn-start { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .btn-stop { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; }
        
        .volume-panel { margin: 20px 0; color: #888; }
        input[type="range"] { width: 80%; accent-color: #27ae60; }

        .info-table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #111; border-radius: 10px; font-size: 0.8em; }
        .info-table td { padding: 10px; border-bottom: 1px solid #222; text-align: left; }
        .diff-display { font-size: 1.8em; color: #00ff95; font-weight: bold; margin: 10px 0; }
        
        @media (max-width: 600px) {
            .container { padding: 15px; border-radius: 0; border: none; background: transparent; }
            .btn-preset { font-size: 0.75em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <span id="b-cs" class="active" onclick="changeLang('cs')">🇨🇿</span>
        <span id="b-en" onclick="changeLang('en')">🇬🇧</span>
        <span id="b-de" onclick="changeLang('de')">🇩🇪</span>
    </div>

    <h1 id="txt-title" style="font-size: 1.5em;">Binaural Lab 🎧</h1>
    
    <div class="presets">
        <button class="btn-preset" onclick="setPreset(100, 101.5)"><span id="p1">🌙 Spánek</span></button>
        <button class="btn-preset" onclick="setPreset(200, 206)"><span id="p2">🧘 Meditace</span></button>
        <button class="btn-preset" onclick="setPreset(300, 310)"><span id="p3">🎨 Relax</span></button>
        <button class="btn-preset" onclick="setPreset(400, 420)"><span id="p4">🧠 Fokus</span></button>
        <button class="btn-preset" onclick="setPreset(200, 240)"><span id="p5">⚡ Výkon</span></button>
    </div>

    <div class="controls">
        <div class="input-group">
            <label id="txt-l" style="display:block; font-size:0.6em; color:#888;">L (Hz)</label>
            <input type="number" id="leftFreq" value="60" oninput="updateDiff()">
        </div>
        <div class="input-group">
            <label id="txt-r" style="display:block; font-size:0.6em; color:#888;">P (Hz)</label>
            <input type="number" id="rightFreq" value="63" oninput="updateDiff()">
        </div>
        <div class="btn-row">
            <button class="main-btn btn-start" id="txt-start" onclick="start()">Start</button>
            <button class="main-btn btn-stop" id="txt-stop" onclick="stop()">Stop</button>
        </div>
    </div>

    <div class="diff-display" id="diffVal">3.0 Hz</div>

    <div class="volume-panel">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5" oninput="updateVolume()">
    </div>

    <canvas id="visual"></canvas>

    <div style="color: #f1c40f; font-size: 0.7em; margin-bottom: 20px;" id="txt-sony">
        ✨ Sony WH-1000XM5 Active
    </div>

    <table class="info-table" id="table-content"></table>
</div>

<script>
let audioCtx, leftOsc, rightOsc, gainNode, animationId, curLang = 'cs';

const trans = {
    cs: {
        title: "Binaural Lab 🎧", p1: "🌙 Spánek", p2: "🧘 Meditace", p3: "🎨 Relax", p4: "🧠 Fokus", p5: "⚡ Výkon",
        l: "Levé (Hz)", r: "Pravé (Hz)", start: "Start", stop: "Stop", vol: "Hlasitost", diff: "Rozdíl",
        sony: "✨ Sony WH-1000XM5 Mode Active", rows: [["Delta","0.5–4Hz","Spánek"],["Theta","4–8Hz","Meditace"],["Alpha","8–13Hz","Klid"],["Beta","13–30Hz","Fokus"]]
    },
    en: {
        title: "Binaural Lab 🎧", p1: "🌙 Sleep", p2: "🧘 Meditate", p3: "🎨 Relax", p4: "🧠 Focus", p5: "⚡ Power",
        l: "Left (Hz)", r: "Right (Hz)", start: "Start", stop: "Stop", vol: "Volume", diff: "Difference",
        sony: "✨ Sony WH-1000XM5 Optimized", rows: [["Delta","0.5–4Hz","Sleep"],["Theta","4–8Hz","Meditate"],["Alpha","8–13Hz","Calm"],["Beta","13–30Hz","Focus"]]
    },
    de: { title: "Binaural Lab 🎧", p1: "🌙 Schlaf", p2: "🧘 Meditation", p3: "🎨 Relax", p4: "🧠 Fokus", p5: "⚡ Leistung", l: "Links", r: "Rechts", start: "Start", stop: "Stopp", vol: "Lautst.", diff: "Diff.", sony: "✨ Sony WH-1000XM5 Aktiv", rows: [["Delta","0.5–4Hz","Schlaf"],["Theta","4–8Hz","Meditat."],["Alpha","8–13Hz","Ruhe"],["Beta","13–30Hz","Fokus"]] }
};

function changeLang(lang) {
    curLang = lang;
    const t = trans[lang];
    document.getElementById('txt-title').innerText = t.title;
    ['p1','p2','p3','p4','p5'].forEach(id => document.getElementById(id).innerText = t[id]);
    document.getElementById('txt-start').innerText = t.start; document.getElementById('txt-stop').innerText = t.stop;
    document.getElementById('txt-sony').innerText = t.sony;
    document.getElementById('table-content').innerHTML = t.rows.map(r => `<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');
    document.querySelectorAll('.lang-bar span').forEach(s => s.classList.remove('active'));
    document.getElementById('b-' + lang).classList.add('active');
    updateDiff();
}

function updateDiff() {
    const f1 = parseFloat(document.getElementById("leftFreq").value) || 0;
    const f2 = parseFloat(document.getElementById("rightFreq").value) || 0;
    document.getElementById("diffVal").innerText = `${Math.abs(f1 - f2).toFixed(1)} Hz`;
}

function setPreset(l, r) {
    document.getElementById("leftFreq").value = l;
    document.getElementById("rightFreq").value = r;
    updateDiff();
    if(audioCtx) start();
}

function updateVolume() { if (gainNode) gainNode.gain.setTargetAtTime(document.getElementById("volume").value, audioCtx.currentTime, 0.05); }

function start() {
    if (audioCtx) stop();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Resume context on mobile touch
    if (audioCtx.state === 'suspended') audioCtx.resume();

    gainNode = audioCtx.createGain(); gainNode.gain.value = document.getElementById("volume").value;
    const f1 = parseFloat(document.getElementById("leftFreq").value);
    const f2 = parseFloat(document.getElementById("rightFreq").value);
    leftOsc = audioCtx.createOscillator(); rightOsc = audioCtx.createOscillator();
    const merger = audioCtx.createChannelMerger(2);
    leftOsc.frequency.value = f1; rightOsc.frequency.value = f2;
    leftOsc.connect(merger, 0, 0); rightOsc.connect(merger, 0, 1);
    merger.connect(gainNode).connect(audioCtx.destination);
    leftOsc.start(); rightOsc.start(); drawWave(f1, f2);
}

function stop() { if (leftOsc) { leftOsc.stop(); rightOsc.stop(); } if (audioCtx) audioCtx.close(); if (animationId) cancelAnimationFrame(animationId); }

function drawWave(f1, f2) {
    const canvas = document.getElementById("visual"); const ctx = canvas.getContext("2d"); let offset = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.lineWidth = 2;
        ctx.beginPath(); ctx.strokeStyle = "#3498db";
        for (let x = 0; x < canvas.width; x++) { let y = 80 + Math.sin((x * 0.03) + offset) * 35; ctx.lineTo(x, y); }
        ctx.stroke();
        ctx.beginPath(); ctx.strokeStyle = "#e74c3c";
        for (let x = 0; x < canvas.width; x++) { let y = 80 + Math.sin((x * 0.03 * (f2/f1)) + offset) * 35; ctx.lineTo(x, y); }
        ctx.stroke();
        offset += 0.05; animationId = requestAnimationFrame(draw);
    }
    draw();
}
changeLang('cs');
</script>
</body>
</html>
