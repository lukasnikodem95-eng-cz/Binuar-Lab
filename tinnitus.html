<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Precision Lab 🔬</title>
    <style>
        :root { --accent: #ff9900; --bg: #0a0a0a; --panel: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        
        /* Nadpis vycentrovaný */
        h1 { color: var(--accent); margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5em; }

        /* Ovládací obdélník se zaoblenými rohy */
        .pad-area {
            width: 100%; height: 320px; background: #000;
            border: 1px solid #333; border-radius: 30px;
            position: relative; touch-action: none; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(255,153,0,0.05);
            margin-bottom: 25px;
        }

        #cursor {
            width: 26px; height: 26px; background: var(--accent);
            border: 3px solid #fff; border-radius: 50%;
            position: absolute; transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 20px var(--accent);
        }

        /* Číselné karty */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { 
            background: var(--panel); padding: 15px; border-radius: 20px; 
            border: 1px solid #222; text-align: center;
        }
        .card label { display: block; font-size: 0.7em; color: #666; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .card input {
            background: transparent; border: none; color: var(--accent);
            font-size: 1.6em; font-family: 'Courier New', monospace;
            width: 100%; text-align: center; outline: none;
        }

        /* Mixer pro poměr hlasitosti */
        .mixer-card { background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 25px; }
        .mixer-label { display: flex; justify-content: space-between; font-size: 0.7em; color: #666; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 8px; }

        .btn-play {
            width: 100%; padding: 22px; border-radius: 50px; border: none;
            background: var(--accent); color: #000; font-weight: bold;
            font-size: 1.2em; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255,153,0,0.3);
            text-transform: uppercase;
        }
        .btn-play:active { transform: scale(0.98); }
        .btn-play.active { background: #222; color: #666; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tinnitus Lab 🔬</h1>

    <div class="pad-area" id="pad">
        <div id="cursor" style="left: 50%; top: 50%;"></div>
    </div>

    <div class="input-row">
        <div class="card">
            <label>Binaural (Hz)</label>
            <input type="number" id="in-bin" value="60" oninput="fromInput()">
        </div>
        <div class="card">
            <label>Filtr (Hz)</label>
            <input type="number" id="in-filter" value="5000" oninput="fromInput()">
        </div>
    </div>

    <div class="mixer-card">
        <div class="mixer-label">
            <span>TÓN</span>
            <span>MIXER</span>
            <span>ŠUM</span>
        </div>
        <input type="range" id="mix" min="0" max="1" step="0.01" value="0.5" oninput="updateMix()">
    </div>

    <button class="btn-play" id="btn" onclick="toggle()">SPUSTIT TERAPII</button>
</div>

<script>
let audioCtx, oscL, oscR, filter, gBin, gNoise, noise, isPlaying = false;
const pad = document.getElementById('pad');
const cursor = document.getElementById('cursor');
const inBin = document.getElementById('in-bin');
const inFilter = document.getElementById('in-filter');
const mixSlider = document.getElementById('mix');

const minF = 1000, maxF = 18000;

function update(e) {
    const rect = pad.getBoundingClientRect();
    const xRaw = e.touches ? e.touches[0].clientX : e.clientX;
    const yRaw = e.touches ? e.touches[0].clientY : e.clientY;
    
    let x = Math.max(0, Math.min(1, (xRaw - rect.left) / rect.width));
    let y = Math.max(0, Math.min(1, (yRaw - rect.top) / rect.height));

    const fBin = Math.round(40 + (x * 160));
    const fFil = Math.round(Math.pow(maxF / minF, 1 - y) * minF);

    inBin.value = fBin;
    inFilter.value = fFil;
    moveCursor(x, y);
    if(isPlaying) apply(fBin, fFil);
}

function fromInput() {
    const fb = parseFloat(inBin.value) || 40;
    const ff = parseFloat(inFilter.value) || 1000;
    let x = (fb - 40) / 160;
    let y = 1 - (Math.log(ff / minF) / Math.log(maxF / minF));
    moveCursor(x, y);
    if(isPlaying) apply(fb, ff);
}

function updateMix() {
    if(!isPlaying) return;
    const val = parseFloat(mixSlider.value);
    gBin.gain.setTargetAtTime((1 - val) * 0.3, audioCtx.currentTime, 0.1);
    gNoise.gain.setTargetAtTime(val * 0.3, audioCtx.currentTime, 0.1);
}

function moveCursor(x, y) {
    cursor.style.left = (Math.max(0, Math.min(100, x * 100))) + '%';
    cursor.style.top = (Math.max(0, Math.min(100, y * 100))) + '%';
}

function apply(fb, ff) {
    oscL.frequency.setTargetAtTime(fb, audioCtx.currentTime, 0.1);
    oscR.frequency.setTargetAtTime(fb + 3, audioCtx.currentTime, 0.1);
    filter.frequency.setTargetAtTime(ff, audioCtx.currentTime, 0.1);
}

pad.addEventListener('mousedown', (e) => { update(e); window.onmousemove = update; });
window.addEventListener('mouseup', () => window.onmousemove = null);
pad.addEventListener('touchstart', (e) => { e.preventDefault(); update(e); }, {passive:false});
pad.addEventListener('touchmove', (e) => { e.preventDefault(); update(e); }, {passive:false});

function toggle() {
    if (isPlaying) { 
        audioCtx.close(); isPlaying = false; 
        document.getElementById('btn').innerText="SPUSTIT TERAPII"; 
        document.getElementById('btn').classList.remove('active'); 
        return; 
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
    isPlaying = true;
    document.getElementById('btn').innerText="ZASTAVIT"; 
    document.getElementById('btn').classList.add('active');

    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const out = buf.getChannelData(0);
    for (let i = 0; i < buf.length; i++) out[i] = Math.random() * 2 - 1;
    
    noise = audioCtx.createBufferSource(); noise.buffer = buf; noise.loop = true;
    filter = audioCtx.createBiquadFilter(); filter.type = "highpass";
    gNoise = audioCtx.createGain(); 
    oscL = audioCtx.createOscillator(); oscR = audioCtx.createOscillator();
    gBin = audioCtx.createGain(); 
    const m = audioCtx.createChannelMerger(2);

    noise.connect(filter).connect(gNoise).connect(audioCtx.destination);
    oscL.connect(m,0,0); oscR.connect(m,0,1); m.connect(gBin).connect(audioCtx.destination);
    
    noise.start(); oscL.start(); oscR.start();
    updateMix();
    fromInput();
}
</script>
</body>
</html>
