<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Lab 🔬</title>
    <style>
        * { box-sizing: border-box; }

        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 5px; overflow-x: hidden; }
        .container { max-width: 800px; margin: auto; padding: 10px; position: relative; }
        
        .lang-bar { position: absolute; top: 10px; right: 15px; display: flex; gap: 8px; cursor: pointer; z-index: 100; }
        .lang-bar span { opacity: 0.4; transition: 0.3s; font-size: 1.1em; }
        .lang-bar span.active { opacity: 1; transform: scale(1.1); }

        .back-btn { position: absolute; top: 10px; left: 15px; color: #444; text-decoration: none; font-size: 1.4em; z-index: 100; }
        
        h1 { color: #ff9900; text-shadow: 0 0 10px #ff6600; margin-bottom: 8px; font-size: 1.4em; letter-spacing: 1px; }

        /* FINÁLNÍ VÝŠKA: 320px */
        .lab-main-row {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin: 12px 0; height: 320px; 
        }

        .v-slider-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; width: 32px; flex-shrink: 0; }
        .v-slider {
            -webkit-appearance: slider-vertical; appearance: slider-vertical;
            width: 9px; height: 100%; accent-color: #ff9900; cursor: pointer;
            background: #111; border-radius: 8px;
        }

        .v-label {
            font-size: 0.55em; color: #555; font-weight: bold; margin-bottom: 5px;
            text-transform: uppercase; writing-mode: vertical-lr; transform: rotate(180deg); white-space: nowrap;
        }

        .pad-wrap { flex-grow: 1; height: 100%; position: relative; max-width: 600px; }
        
        #xy-pad {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; cursor: crosshair; touch-action: none; overflow: hidden;
            border: 2px solid #222; border-radius: 18px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Otazník - o 2px menší */
        .help-btn-in {
            position: absolute; 
            top: 15px; right: 15px; 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255, 153, 0, 0.2); color: #ff9900;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-weight: bold; z-index: 100; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            font-size: 0.95em;
        }

        /* Kulička - o 2px menší */
        #xy-cursor { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; border: 2px solid #fff; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px auto; max-width: 450px; }
        .stat-box { background: #151515; padding: 8px; border-radius: 12px; border: 1px solid #222; }
        .stat-box label { display: block; font-size: 0.6em; color: #444; margin-bottom: 3px; text-transform: uppercase; }
        .stat-input { background: transparent; border: none; color: #ff9900; font-size: 1.2em; font-weight: bold; width: 100%; text-align: center; outline: none; }

        .btn-start { 
            background: linear-gradient(135deg, #ff6600, #ff9900); color: white; border: none; 
            padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; 
            font-size: 0.95em; margin-top: 8px;
        }

        @media (max-width: 600px) {
            .lab-main-row { height: 280px; gap: 6px; }
            h1 { font-size: 1.2em; }
        }

        .help-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .help-content { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #444; max-width: 450px; text-align: left; position: relative; }
        .help-content h2 { color: #ff9900; margin-top: 0; font-size: 1.5em; }
        .help-content ul { padding-left: 20px; color: #bbb; line-height: 1.6; list-style: square; font-size: 0.95em; }
        .close-help { position: absolute; top: 12px; right: 20px; font-size: 1.8em; cursor: pointer; color: #444; }
        canvas#noiseCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">←</a>
    <div class="lang-bar">
        <span id="b-cs" class="active" onclick="changeLang('cs')">🇨🇿</span>
        <span id="b-en" onclick="changeLang('en')">🇬🇧</span>
        <span id="b-de" onclick="changeLang('de')">🇩🇪</span>
        <span id="b-es" onclick="changeLang('es')">🇪🇸</span>
        <span id="b-fr" onclick="changeLang('fr')">🇫🇷</span>
    </div>
    <h1 id="txt-title">TINNITUS LAB 🔬</h1>
    <div class="lab-main-row">
        <div class="v-slider-wrap">
            <span class="v-label" id="mix-l">BINAURAL</span>
            <input type="range" id="vol-bin" class="v-slider" min="0" max="1" step="0.01" value="0.4" oninput="updateVolumes()">
        </div>
        <div class="pad-wrap">
            <div id="xy-pad">
                <canvas id="noiseCanvas"></canvas>
                <div id="xy-cursor" style="left: 50%; top: 50%;"></div>
                <button class="help-btn-in" id="help-trigger" onclick="toggleHelp(event)">?</button>
            </div>
        </div>
        <div class="v-slider-wrap">
            <span class="v-label" id="mix-r">ŠUM</span>
            <input type="range" id="vol-noise" class="v-slider" min="0" max="1" step="0.01" value="0.4" oninput="updateVolumes()">
        </div>
    </div>
    <div class="stats-grid">
        <div class="stat-box">
            <label id="lbl-bin">Binaural (Hz)</label>
            <input type="number" id="input-bin" class="stat-input" value="60" oninput="manualUpdate()">
        </div>
        <div class="stat-box">
            <label id="lbl-fil">Filtr (Hz)</label>
            <input type="number" id="input-filter" class="stat-input" value="5000" oninput="manualUpdate()">
        </div>
    </div>
    <button class="btn-start" id="btn-start" onclick="start()">SPUSTIT TERAPII</button>
</div>

<div id="help-modal" class="help-overlay" onclick="toggleHelp()">
    <div class="help-content" onclick="event.stopPropagation()">
        <span class="close-help" onclick="toggleHelp()">&times;</span>
        <h2 id="h-title">Manuál Laboratoře 🔬</h2>
        <ul id="h-list">
            <li><strong>Osa X:</strong> Doleva = hlubší, doprava = vyšší frekvence.</li>
            <li><strong>Osa Y:</strong> Nahoru = ostřejší/čistší filtr šumu.</li>
            <li><strong>Binaurální tón:</strong> Vytváří efekt vlnění v hlavě.</li>
        </ul>
    </div>
</div>

<script>
/* (JavaScript zůstává stejný a plně funkční) */
const MIN_FREQ = 40; const MAX_FREQ = 400;
const texts = { cs: { title: "TINNITUS LAB 🔬", bin: "Binaural (Hz)", fil: "Filtr (Hz)", start: "SPUSTIT TERAPII", stop: "ZASTAVIT", l: "BINAURAL", r: "ŠUM", h_t: "Manuál Laboratoře 🔬" }, en: { title: "TINNITUS LAB 🔬", bin: "Binaural (Hz)", fil: "Filter (Hz)", start: "START THERAPY", stop: "STOP", l: "BINAURAL", r: "NOISE", h_t: "Lab Manual 🔬" } };
function changeLang(lang) { document.querySelectorAll('.lang-bar span').forEach(s => s.classList.remove('active')); document.getElementById('b-' + lang).classList.add('active'); const t = texts[lang] || texts['en']; document.getElementById('txt-title').innerText = t.title; document.getElementById('lbl-bin').innerText = t.bin; document.getElementById('lbl-fil').innerText = t.fil; document.getElementById('mix-l').innerText = t.l; document.getElementById('mix-r').innerText = t.r; document.getElementById('h-title').innerText = t.h_t; document.getElementById('btn-start').innerText = isPlaying ? t.stop : t.start; resize(); }
function toggleHelp(e) { if(e) e.stopPropagation(); const modal = document.getElementById('help-modal'); modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex'; }
let audioCtx, oscL, oscR, gainBin, gainNoise, noiseNode, filterNode, isPlaying = false;
let canvas = document.getElementById('noiseCanvas'), ctx = canvas.getContext('2d'), waves = [];
let mouseX = 0.5, mouseY = 0.5;
function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
window.addEventListener('resize', resize); resize();
class Wave { constructor(x, y, color) { this.x = x; this.y = y; this.radius = 2; this.life = 1.0; this.decay = 0.005 + Math.random() * 0.003; this.color = color; this.lineWidth = 1.5 + Math.random() * 2; } update(speedMult) { this.radius += 1.2 * (speedMult + 1); this.life -= this.decay; } draw() { if (this.life <= 0) return; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.strokeStyle = this.color.replace('1)', this.life + ')'); ctx.lineWidth = this.lineWidth * this.life; ctx.stroke(); } }
function animate() { ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height); const noiseLevel = 1 - mouseY; const hue = 240 - (mouseX * 240); const color = `hsla(${hue}, 100%, 60%, 1)`; const cursor = document.getElementById('xy-cursor'); cursor.style.backgroundColor = color; cursor.style.boxShadow = `0 0 30px ${color}`; const helpBtn = document.getElementById('help-trigger'); helpBtn.style.color = color; helpBtn.style.borderColor = color; ctx.globalCompositeOperation = 'lighter'; if (isPlaying && Math.random() < 0.2) waves.push(new Wave(mouseX * canvas.width, mouseY * canvas.height, color)); waves = waves.filter(w => w.life > 0); waves.forEach(w => { w.update(noiseLevel); w.draw(); }); requestAnimationFrame(animate); }
animate();
function manualUpdate() { let freq = parseFloat(document.getElementById('input-bin').value) || MIN_FREQ; let fil = parseFloat(document.getElementById('input-filter').value) || 1000; mouseX = Math.max(0, Math.min(1, (freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ))); mouseY = Math.max(0, Math.min(1, 1 - (Math.log(fil / 1000) / Math.log(16000 / 1000)))); document.getElementById('xy-cursor').style.left = (mouseX * 100) + '%'; document.getElementById('xy-cursor').style.top = (mouseY * 100) + '%'; if (isPlaying) updateAudio(mouseX, mouseY, false); }
function handleMove(e) { const rect = document.getElementById('xy-pad').getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; mouseX = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); mouseY = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)); document.getElementById('xy-cursor').style.left = (mouseX * 100) + '%'; document.getElementById('xy-cursor').style.top = (mouseY * 100) + '%'; updateAudio(mouseX, mouseY, true); }
document.getElementById('xy-pad').addEventListener('mousedown', handleMove); document.getElementById('xy-pad').addEventListener('mousemove', (e) => { if(e.buttons === 1) handleMove(e); }); document.getElementById('xy-pad').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(e); }, {passive: false}); document.getElementById('xy-pad').addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
function updateAudio(x, y, updateInputs) { const freq = MIN_FREQ + (x * (MAX_FREQ - MIN_FREQ)); const filterFreq = Math.pow(16000 / 1000, (1 - y)) * 1000; if(updateInputs) { document.getElementById('input-bin').value = freq.toFixed(0); document.getElementById('input-filter').value = filterFreq.toFixed(0); } if (isPlaying) { oscL.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1); oscR.frequency.setTargetAtTime(freq + 3, audioCtx.currentTime, 0.1); filterNode.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1); } }
function updateVolumes() { if (!isPlaying) return; gainBin.gain.setTargetAtTime(document.getElementById('vol-bin').value * 0.4, audioCtx.currentTime, 0.1); gainNoise.gain.setTargetAtTime(document.getElementById('vol-noise').value * 0.4, audioCtx.currentTime, 0.1); }
function start() { if (isPlaying) { stop(); return; } audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isPlaying = true; const lang = document.querySelector('.lang-bar span.active').id.split('-')[1]; document.getElementById('btn-start').innerText = texts[lang].stop; const bufferSize = 2 * audioCtx.sampleRate; const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const output = noiseBuffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1; noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = noiseBuffer; noiseNode.loop = true; filterNode = audioCtx.createBiquadFilter(); filterNode.type = "highpass"; gainNoise = audioCtx.createGain(); oscL = audioCtx.createOscillator(); oscR = audioCtx.createOscillator(); gainBin = audioCtx.createGain(); const merger = audioCtx.createChannelMerger(2); noiseNode.connect(filterNode); filterNode.connect(gainNoise).connect(audioCtx.destination); oscL.connect(merger, 0, 0); oscR.connect(merger, 0, 1); merger.connect(gainBin).connect(audioCtx.destination); noiseNode.start(); oscL.start(); oscR.start(); updateVolumes(); manualUpdate(); }
function stop() { isPlaying = false; if (audioCtx) audioCtx.close(); const lang = document.querySelector('.lang-bar span.active').id.split('-')[1]; document.getElementById('btn-start').innerText = texts[lang].start; }
</script>
</body>
</html>
