<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Lab Beta 🔬</title>
    <style>
        body { background: #0a0500; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #1a1005; padding: 25px; border-radius: 20px; border: 1px solid #442200; box-shadow: 0 10px 40px rgba(255, 100, 0, 0.2); }
        h1 { color: #ff9900; text-shadow: 0 0 10px #ff6600; }
        canvas { width: 100%; height: 180px; background: #000; border-radius: 15px; margin: 20px 0; border: 1px solid #552200; cursor: pointer; }
        .control-panel { background: #221100; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .slider-label { display: block; margin-bottom: 10px; color: #ff9900; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: #ff9900; margin-bottom: 20px; }
        .btn-start { background: linear-gradient(135deg, #ff6600, #ff9900); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; width: 100%; margin-bottom: 10px; }
        .btn-stop { background: #331100; color: #ff6600; border: 1px solid #ff6600; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; }
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <h1>Tinnitus Lab Beta 🔬</h1>
    <p style="font-size: 0.8em; color: #aa8866;">Maskování vysokého pískotu pomocí hnědého šumu</p>

    <canvas id="visual" onclick="toggleFullscreen()"></canvas>

    <div class="control-panel">
        <label class="slider-label">Hloubka šumu (Brown Noise)</label>
        <input type="range" id="noiseVol" min="0" max="1" step="0.01" value="0.5" oninput="updateVolume()">
        
        <label class="slider-label">Frekvence "Antidot" (Hz): <span id="freqVal">60</span></label>
        <input type="range" id="freqBase" min="40" max="100" step="1" value="60" oninput="updateFreq()">
    </div>

    <button class="btn-start" onclick="start()">SPUSTIT MASKOVÁNÍ</button>
    <button class="btn-stop" onclick="stop()">ZASTAVIT</button>

    <a href="index.html" class="back-link">← Zpět do Binaural Labu</a>
</div>

<script>
let audioCtx, noiseNode, oscL, oscR, gainNoise, gainOsc, animationId, isPlaying = false;

function createBrownNoise() {
    const bufferSize = 4096;
    let lastOut = 0.0;
    const node = audioCtx.createScriptProcessor(bufferSize, 1, 1);
    node.onaudioprocess = function(e) {
        const output = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            output[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = output[i];
            output[i] *= 3.5; // Zesílení hnědého šumu
        }
    };
    return node;
}

function start() {
    if (isPlaying) stop();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    isPlaying = true;

    // ŠUM
    noiseNode = createBrownNoise();
    gainNoise = audioCtx.createGain();
    gainNoise.gain.value = document.getElementById('noiseVol').value;

    // ANTIDOT (Těch tvých 60/63 Hz)
    const baseF = parseFloat(document.getElementById('freqBase').value);
    oscL = audioCtx.createOscillator();
    oscR = audioCtx.createOscillator();
    gainOsc = audioCtx.createGain();
    gainOsc.gain.value = 0.3; // Jemnější tón k šumu

    const merger = audioCtx.createChannelMerger(2);
    oscL.frequency.value = baseF;
    oscR.frequency.value = baseF + 3;

    noiseNode.connect(gainNoise).connect(audioCtx.destination);
    oscL.connect(merger, 0, 0);
    oscR.connect(merger, 0, 1);
    merger.connect(gainOsc).connect(audioCtx.destination);

    oscL.start(); oscR.start();
    draw();
}

function stop() {
    isPlaying = false;
    if (audioCtx) audioCtx.close();
    if (animationId) cancelAnimationFrame(animationId);
}

function updateVolume() { if (gainNoise) gainNoise.gain.value = document.getElementById('noiseVol').value; }
function updateFreq() {
    const val = document.getElementById('freqBase').value;
    document.getElementById('freqVal').innerText = val;
    if (oscL) {
        oscL.frequency.setTargetAtTime(parseFloat(val), audioCtx.currentTime, 0.1);
        oscR.frequency.setTargetAtTime(parseFloat(val) + 3, audioCtx.currentTime, 0.1);
    }
}

function draw() {
    const canvas = document.getElementById("visual");
    const ctx = canvas.getContext("2d");
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;

    function render() {
        if (!isPlaying) return;
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.strokeStyle = "#ff6600";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff00ff";

        let time = Date.now() * 0.005;
        for (let x = 0; x < canvas.width; x++) {
            let y = (canvas.height / 2) + Math.sin(x * 0.02 + time) * 40 + (Math.random() * 5); // Šum ve vlně
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        animationId = requestAnimationFrame(render);
    }
    render();
}

function toggleFullscreen() {
    const c = document.getElementById("visual");
    if (c.requestFullscreen) c.requestFullscreen();
    else if (c.webkitRequestFullscreen) c.webkitRequestFullscreen();
}
</script>
</body>
</html>
