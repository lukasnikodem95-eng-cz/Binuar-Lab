<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Lab 🔬 - Master Mixer</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #151515; padding: 25px; border-radius: 20px; border: 1px solid #ff9900; box-shadow: 0 0 30px rgba(255, 153, 0, 0.2); }
        h1 { color: #ff9900; text-shadow: 0 0 10px #ff6600; margin-bottom: 5px; }
        
        /* 1. ZMĚNA: Pozadí čtverce je čistě černé bez gradientu */
        #xy-pad {
            width: 100%; height: 280px; background: #000000;
            border: 2px solid #333; border-radius: 15px; position: relative; margin: 20px 0; touch-action: none; overflow: hidden; cursor: crosshair;
        }
        
        /* 2. ZMĚNA: Kulička má silnější NEONOVÝ EFEKT */
        #xy-cursor {
            width: 24px; height: 24px; background: #ff9900; border-radius: 50%; position: absolute;
            transform: translate(-50%, -50%); 
            /* Silnější oranžovo-růžová záře */
            box-shadow: 0 0 15px #ff9900, 0 0 30px #ff00ff; 
            pointer-events: none; border: 2px solid white;
        }
        
        /* Styl pro popisky */
        .pad-label { position: absolute; font-size: 0.65em; color: #666; pointer-events: none; font-weight: bold; text-transform: uppercase; }
        
        /* Styl pro Mixer (Fader) */
        .mixer-section { margin: 25px 0; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .mixer-labels { display: flex; justify-content: space-between; font-size: 0.7em; color: #888; margin-bottom: 10px; }
        input[type="range"].mixer-fader {
            width: 100%; height: 8px; border-radius: 5px; background: #222; outline: none; -webkit-appearance: none; accent-color: #ff9900;
        }

        .btn-start { background: linear-gradient(135deg, #ff6600, #ff9900); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; font-size: 1.1em; }
        .btn-stop { background: #222; color: #888; border: 1px solid #444; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; }
        .stats { display: flex; justify-content: space-around; font-size: 0.8em; color: #ff9900; margin-bottom: 10px; }
        .back-link { display:block; margin-top:20px; color:#444; text-decoration:none; font-size:0.8em; }
    </style>
</head>
<body>
<div class="container">
    <h1>Tinnitus Lab 🔬</h1>
    
    <div id="xy-pad">
        <span class="pad-label" style="top: 10px; left: 50%; transform: translateX(-50%);">VÍCE ŠUMU</span>
        <span class="pad-label" style="bottom: 10px; left: 50%; transform: translateX(-50%);">MÉNĚ ŠUMU</span>
        <span class="pad-label" style="top: 50%; left: 10px; transform: translateY(-50%);">RELAX</span>
        <span class="pad-label" style="top: 50%; right: 10px; transform: translateY(-50%);">ENERGIE</span>
        
        <div id="xy-cursor" style="left: 50%; top: 50%;"></div>
    </div>

    <div class="stats">
        <span>Tón: <b id="stat-bin">60</b> Hz</span>
        <span>Filtr: <b id="stat-filter">5000</b> Hz</span>
    </div>

    <div class="mixer-section">
        <div class="mixer-labels">
            <span>🎧 BINAURAL</span>
            <span>MIXER</span>
            <span>🌊 SHUM</span>
        </div>
        <input type="range" id="mixer" class="mixer-fader" min="0" max="1" step="0.01" value="0.5" oninput="updateMix()">
    </div>

    <button class="btn-start" onclick="start()">SPUSTIT TERAPII</button>
    <button class="btn-stop" onclick="stop()">ZASTAVIT</button>
    
    <a href="index.html" class="back-link">← Zpět do Binaural Labu</a>
</div>

<script>
let audioCtx, oscL, oscR, gainBin, gainNoise, noiseNode, filterNode, isPlaying = false;

const pad = document.getElementById('xy-pad');
const cursor = document.getElementById('xy-cursor');

function handleMove(e) {
    const rect = pad.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    let y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    cursor.style.left = (x * 100) + '%';
    cursor.style.top = (y * 100) + '%';
    updateAudio(x, y);
}

pad.addEventListener('mousedown', handleMove);
pad.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleMove(e); });
pad.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
pad.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});

function updateAudio(x, y) {
    const freq = 40 + (x * 110);
    const filterFreq = 1000 + ((1 - y) * 11000);
    document.getElementById('stat-bin').innerText = freq.toFixed(0);
    document.getElementById('stat-filter').innerText = filterFreq.toFixed(0);
    if (isPlaying && audioCtx.state === 'running') {
        oscL.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
        oscR.frequency.setTargetAtTime(freq + 3, audioCtx.currentTime, 0.1);
        filterNode.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);
    }
}

function updateMix() {
    if (!isPlaying) return;
    const mixVal = parseFloat(document.getElementById('mixer').value);
    // Logaritmické zeslabování pro plynulejší přechod
    gainBin.gain.setTargetAtTime((1 - mixVal) * 0.4, audioCtx.currentTime, 0.1);
    gainNoise.gain.setTargetAtTime(mixVal * 0.4, audioCtx.currentTime, 0.1);
}

function start() {
    if (isPlaying) stop();
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    isPlaying = true;

    // ŠUM (White)
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = noiseBuffer;
    noiseNode.loop = true;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = "highpass"; 
    gainNoise = audioCtx.createGain();

    // BINAURAL
    oscL = audioCtx.createOscillator();
    oscR = audioCtx.createOscillator();
    gainBin = audioCtx.createGain();
    const merger = audioCtx.createChannelMerger(2);

    noiseNode.connect(filterNode);
    filterNode.connect(gainNoise).connect(audioCtx.destination);
    oscL.connect(merger, 0, 0);
    oscR.connect(merger, 0, 1);
    merger.connect(gainBin).connect(audioCtx.destination);

    noiseNode.start();
    oscL.start(); oscR.start();

    // Nastavení podle aktuálních sliderů
    updateMix();
    const rect = cursor.getBoundingClientRect();
    const padRect = pad.getBoundingClientRect();
    updateAudio((rect.left - padRect.left)/padRect.width, (rect.top - padRect.top)/padRect.height);
}

function stop() {
    isPlaying = false;
    if (audioCtx) audioCtx.close();
}
</script>
</body>
</html>
